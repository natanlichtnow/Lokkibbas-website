<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Demo Admin - Laudos de Parapente</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,500;0,700;1,400;1,600;1,700&family=Saira+Condensed:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./css/demo.css" />
</head>
<body>
  <main class="layout">
    <header class="topbar">
      <div>
        <h1 class="topbar__title">Area da Oficina (Demo)</h1>
        <p class="topbar__subtitle">Ambiente estatico para apresentacao no GitHub Pages</p>
      </div>
      <a class="button button--ghost" href="./index.html">Consulta Publica</a>
    </header>

    <section id="login-panel" class="panel">
      <h2 class="panel__title">Login demo</h2>
      <form id="login-form" class="panel__row">
        <input class="input" id="username" type="text" placeholder="Usuario" required />
        <input class="input" id="password" type="password" placeholder="Senha" required />
        <button class="button" type="submit">Entrar</button>
      </form>
      <div class="panel__status" id="login-status"></div>
      <p class="panel__hint">Credenciais demo: <code>demo-admin</code> / <code>demo-123</code></p>
    </section>

    <section id="editor-panel" class="panel panel--hidden">
      <h2 class="panel__title">Editar laudo por serial</h2>
      <div class="panel__row">
        <input class="input" id="serial" type="text" placeholder="Numero de serie" />
        <button class="button" id="load-report" type="button">Carregar</button>
        <button class="button button--ghost" id="logout" type="button">Sair</button>
      </div>
      <div class="panel__status" id="editor-status"></div>
    </section>

    <form id="editor-form" class="report report--hidden">
      <article class="sheet">
        <div class="sheet__corner" aria-hidden="true"></div>
        <header class="sheet__header">
          <h2 class="sheet__title">Dados Gerais</h2>
          <span class="sheet__tag">Laudo de Inspecao</span>
        </header>

        <div class="grid">
          <label class="field field--full"><span class="field__label">Proprietario</span><input class="field__input" data-field="ownerName" type="text" /></label>
          <label class="field"><span class="field__label">Fone</span><input class="field__input" data-field="phone" type="text" /></label>
          <label class="field"><span class="field__label">Email</span><input class="field__input" data-field="email" type="email" /></label>
          <label class="field"><span class="field__label">Equip.</span><input class="field__input" data-field="equipment" type="text" /></label>
          <label class="field"><span class="field__label">Serial</span><input class="field__input" data-field="serial" type="text" readonly /></label>
          <label class="field"><span class="field__label">Fabric.</span><input class="field__input" data-field="manufactureDate" type="text" /></label>
          <label class="field"><span class="field__label">Cor Extradorso</span><input class="field__input" data-field="extradorsoColor" type="text" /></label>
          <label class="field"><span class="field__label">Cor Intradorso</span><input class="field__input" data-field="intradorsoColor" type="text" /></label>
          <label class="field"><span class="field__label">Data da Inspecao</span><input class="field__input" data-field="inspectionDate" type="date" /></label>
          <label class="field"><span class="field__label">Proxima Inspecao</span><input class="field__input" data-field="nextInspectionDate" type="date" /></label>
        </div>

        <h3 class="section-title">Teste de Porosidade</h3>
        <div class="grid">
          <label class="field"><span class="field__label">Esquerda</span><input class="field__input" data-field="porosityLeft" type="number" step="0.1" /></label>
          <label class="field"><span class="field__label">Centro Esq.</span><input class="field__input" data-field="porosityCenterLeft" type="number" step="0.1" /></label>
          <label class="field"><span class="field__label">Centro</span><input class="field__input" data-field="porosityCenter" type="number" step="0.1" /></label>
          <label class="field"><span class="field__label">Centro Dir.</span><input class="field__input" data-field="porosityCenterRight" type="number" step="0.1" /></label>
          <label class="field"><span class="field__label">Direita</span><input class="field__input" data-field="porosityRight" type="number" step="0.1" /></label>
          <label class="field field--full"><span class="field__label">Media</span><input class="field__input" data-field="porosityAverage" type="number" step="0.1" /></label>
        </div>
      </article>
    </form>
  </main>

  <script src="./js/demo-store.js"></script>
  <script src="./js/admin-demo.js"></script>
</body>
</html>
